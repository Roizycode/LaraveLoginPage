services:
  - type: web
    name: laravel-login-app
    env: php
    plan: free
    buildCommand: |
      # Install Composer dependencies
      composer install --no-dev --optimize-autoloader
      
      # Install Node dependencies & build frontend (Vite)
      npm ci
      npm run build

      # Laravel setup commands
      php artisan key:generate --force
      php artisan migrate --force || true
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache

    startCommand: php artisan serve --host=0.0.0.0 --port=10000

    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        value: base64:CL23lWmW5r/0ONuyDwN6fAaiLYDpiqWfKhYqQ6i1big=
      - key: APP_URL
        value: https://laravel-login-app.onrender.com
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /opt/render/project/src/database/database.sqlite
      - key: LOG_CHANNEL
        value: stderr
