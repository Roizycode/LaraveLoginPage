services:
  - type: web
    name: laravel-login-app
    env: docker
    plan: free
    dockerImage: ghcr.io/Roizycode/Laravite-Loginpage:latest

    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        value: base64:CL23lWmW5r/0ONuyDwN6fAaiLYDpiqWfKhYqQ6i1big=
      - key: APP_URL
        value: https://mylaravel-loginpage.onrender.com
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /opt/render/project/src/database/database.sqlite
      - key: LOG_CHANNEL
        value: stderr
